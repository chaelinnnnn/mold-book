<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Language as Mold — Field Notes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap');
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    font-family: 'IM Fell English', serif;
    overflow: hidden;
    cursor: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #cursor {
    position: fixed; pointer-events: none; z-index: 9999;
    width: 10px; height: 10px;
    border: 1px solid rgba(255,255,255,0.5); border-radius: 50%;
    transform: translate(-50%,-50%);
    transition: width 0.15s, height 0.15s;
  }
  #cursor.next { width: 16px; height: 16px; border-color: #fff; }
  #title { position: fixed; top: 24px; left: 40px; font-size: 11px; letter-spacing: 0.14em; color: rgba(255,255,255,0.3); z-index: 100; }
  #counter { position: fixed; bottom: 24px; right: 40px; font-size: 11px; letter-spacing: 0.14em; color: rgba(255,255,255,0.3); z-index: 100; }
  #hint { position: fixed; bottom: 24px; left: 40px; font-size: 11px; letter-spacing: 0.08em; color: rgba(255,255,255,0.2); font-style: italic; z-index: 100; transition: opacity 1s; }

  #stage {
    position: relative;
    /* PNG 비율 맞춤 — 약 3:1 가로세로 */
    width: 90vw;
    height: calc(90vw / 3);
    max-height: 80vh;
    max-width: calc(80vh * 3);
  }

  .page {
    position: absolute;
    inset: 0;
    will-change: transform, opacity;
  }
  .page img {
    width: 100%; height: 100%;
    object-fit: fill;
    display: block;
  }
</style>
</head>
<body>
<div id="cursor"></div>
<div id="title">Language as Mold — Field Notes</div>
<div id="counter">1 / 20</div>
<div id="hint">← → or click to turn page</div>
<div id="stage"></div>

<script>
const TOTAL = 20;
let current = 0;
let turning = false;
const stage    = document.getElementById('stage');
const counter  = document.getElementById('counter');
const hint     = document.getElementById('hint');
const cursorEl = document.getElementById('cursor');

const pages = new Array(TOTAL);
for (let i = TOTAL - 1; i >= 0; i--) {
  const div = document.createElement('div');
  div.className = 'page';
  const img = document.createElement('img');
  img.src = `${i + 1}.png`;
  div.appendChild(img);
  stage.appendChild(div);
  pages[i] = div;
}

function layout(animate) {
  pages.forEach((page, i) => {
    page.style.transition = animate ? 'transform 0.42s ease, opacity 0.35s ease' : 'none';
    if (i < current) {
      page.style.zIndex    = i;
      page.style.opacity   = '0';
      page.style.transform = 'translateX(-120%) rotate(-2deg)';
      return;
    }
    const depth = i - current;
    const opMap = [1, 0.55, 0.35, 0.2, 0.12, 0.08, 0.06];
    page.style.zIndex    = TOTAL - depth;
    page.style.opacity   = depth < opMap.length ? opMap[depth] : 0.04;
    page.style.transform = 'translate(0,0)';
  });
  counter.textContent = `${current + 1} / ${TOTAL}`;
}

function goNext() {
  if (current >= TOTAL - 1 || turning) return;
  turning = true;
  const top = pages[current];
  top.style.transition = 'transform 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease';
  top.style.transform  = 'translateX(-120%) rotate(-2deg)';
  top.style.opacity    = '0';
  setTimeout(() => { current++; layout(true); setTimeout(() => turning = false, 460); }, 200);
}

function goPrev() {
  if (current <= 0 || turning) return;
  turning = true;
  current--;
  const r = pages[current];
  r.style.transition = 'none';
  r.style.transform  = 'translateX(-120%) rotate(-2deg)';
  r.style.opacity    = '0';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    layout(true);
    setTimeout(() => turning = false, 460);
  }));
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goNext();
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goPrev();
});
document.addEventListener('click', e => {
  if (e.clientX > window.innerWidth / 2) goNext();
  else goPrev();
});
document.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top  = e.clientY + 'px';
  cursorEl.classList.toggle('next', e.clientX > window.innerWidth / 2);
});
setTimeout(() => hint.style.opacity = '0', 4000);
layout(false);
</script>
</body>
</html>
