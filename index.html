<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Language as Mold — Field Notes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap');
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #b0ada6;
    font-family: 'IM Fell English', serif;
    overflow: hidden;
    cursor: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #cursor {
    position: fixed; pointer-events: none; z-index: 9999;
    width: 10px; height: 10px;
    border: 1px solid rgba(26,26,24,0.6); border-radius: 50%;
    transform: translate(-50%,-50%);
    transition: width 0.15s, height 0.15s;
  }
  #cursor.next { width: 16px; height: 16px; border-color: #1a1a18; }
  #ui { position: fixed; inset: 0; z-index: 200; pointer-events: none; }
  #title { position: absolute; top: 32px; left: 48px; font-size: 11px; letter-spacing: 0.14em; color: rgba(26,26,24,0.45); }
  #counter { position: absolute; bottom: 32px; right: 48px; font-size: 11px; letter-spacing: 0.14em; color: rgba(26,26,24,0.45); }
  #hint { position: absolute; bottom: 32px; left: 48px; font-size: 11px; letter-spacing: 0.08em; color: rgba(26,26,24,0.3); font-style: italic; transition: opacity 1s; }
  #scene { position: relative; width: 780px; height: 460px; }
  .page {
    position: absolute; width: 780px; height: 460px;
    background: #f2f0eb;
    border-radius: 1px 3px 3px 1px;
    overflow: hidden;
    transform-origin: left center;
    will-change: transform, opacity;
  }
  .page img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    mix-blend-mode: multiply;
  }
  #book-shadow {
    position: absolute; inset: 0;
    border-radius: 1px 3px 3px 1px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 4px 14px rgba(0,0,0,0.22);
    pointer-events: none; z-index: 400;
  }
  #spine {
    position: absolute; left: 0; top: 0; width: 22px; height: 100%;
    background: linear-gradient(to right, rgba(0,0,0,0.24), rgba(0,0,0,0.05), transparent);
    z-index: 410; pointer-events: none; border-radius: 1px 0 0 1px;
  }
  #inner-shadow {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.04) 0%, transparent 10%), linear-gradient(to top, rgba(0,0,0,0.03) 0%, transparent 10%);
    z-index: 405; pointer-events: none;
  }
</style>
</head>
<body>
<div id="cursor"></div>
<div id="ui">
  <div id="title">Language as Mold — Field Notes</div>
  <div id="counter">1 / 20</div>
  <div id="hint">← → or click to turn page</div>
</div>
<div id="scene">
  <div id="book-shadow"></div>
  <div id="spine"></div>
  <div id="inner-shadow"></div>
</div>
<script>
const TOTAL = 20;
let current = 0;
let turning = false;
const scene    = document.getElementById('scene');
const counter  = document.getElementById('counter');
const hint     = document.getElementById('hint');
const cursorEl = document.getElementById('cursor');
const pages = new Array(TOTAL);
// 역순으로 생성 — TOTAL부터 1까지, 그래서 1.png가 맨 위
for (let i = TOTAL - 1; i >= 0; i--) {
  const page = document.createElement('div');
  page.className = 'page';
  const img = document.createElement('img');
  img.src = `${i + 1}.png`;
  page.appendChild(img);
  scene.insertBefore(page, document.getElementById('book-shadow'));
  pages[i] = page;
}
function layout(animate) {
  pages.forEach((page, i) => {
    const tr = animate ? 'transform 0.42s ease, opacity 0.35s ease' : 'none';
    page.style.transition = tr;
    if (i < current) {
      page.style.zIndex   = i;
      page.style.opacity  = '0';
      page.style.transform = 'translateX(-820px) rotate(-2deg)';
      return;
    }
    const depth = i - current;
    const tx    = depth * 2.2;
    const ty    = depth * 0.8;
    const op    = depth === 0 ? 1 : Math.max(0.1, 1 - depth * 0.065);
    page.style.zIndex   = TOTAL - depth;
    page.style.opacity  = op;
    page.style.transform = `translate(${tx}px,${ty}px)`;
  });
  counter.textContent = `${current + 1} / ${TOTAL}`;
}
function goNext() {
  if (current >= TOTAL - 1 || turning) return;
  turning = true;
  const top = pages[current];
  top.style.transition = 'transform 0.38s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease';
  top.style.transform  = 'translateX(-820px) rotate(-2deg)';
  top.style.opacity    = '0';
  setTimeout(() => { current++; layout(true); setTimeout(() => turning = false, 460); }, 200);
}
function goPrev() {
  if (current <= 0 || turning) return;
  turning = true;
  current--;
  const r = pages[current];
  r.style.transition = 'none';
  r.style.transform  = 'translateX(-820px) rotate(-2deg)';
  r.style.opacity    = '0';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    layout(true);
    setTimeout(() => turning = false, 460);
  }));
}
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goNext();
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goPrev();
});
document.addEventListener('click', e => {
  if (e.clientX > window.innerWidth / 2) goNext();
  else goPrev();
});
document.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top  = e.clientY + 'px';
  cursorEl.classList.toggle('next', e.clientX > window.innerWidth / 2);
});
setTimeout(() => hint.style.opacity = '0', 4000);
layout(false);
</script>
</body>
</html>
