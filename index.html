<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Language as Mold — Field Notes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f2f0eb;
    --ink: #1a1a18;
    --mid: #8a8880;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: 'IM Fell English', serif;
    overflow: hidden;
    cursor: none;
  }

  /* custom cursor */
  #cursor {
    position: fixed;
    pointer-events: none;
    z-index: 1000;
    width: 10px; height: 10px;
    border: 1px solid rgba(26,26,24,0.4);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: width 0.15s, height 0.15s;
  }
  #cursor.next  { width: 18px; height: 18px; border-color: var(--ink); }

  /* page counter */
  #counter {
    position: fixed;
    bottom: 40px; right: 48px;
    font-size: 11px;
    letter-spacing: 0.14em;
    color: rgba(26,26,24,0.35);
    z-index: 100;
    user-select: none;
  }

  /* title */
  #title {
    position: fixed;
    top: 36px; left: 48px;
    font-size: 11px;
    letter-spacing: 0.14em;
    color: rgba(26,26,24,0.3);
    z-index: 100;
    user-select: none;
  }

  /* nav hint */
  #hint {
    position: fixed;
    bottom: 40px; left: 48px;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: rgba(26,26,24,0.25);
    z-index: 100;
    user-select: none;
    font-style: italic;
    transition: opacity 0.5s;
  }

  /* stage */
  #stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* each layer */
  .layer {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.6s ease;
  }

  .layer img {
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    object-position: center;
    display: block;
    mix-blend-mode: multiply;
  }
</style>
</head>
<body>

<div id="cursor"></div>
<div id="title">Language as Mold — Field Notes</div>
<div id="counter">1 / 30</div>
<div id="hint">← → or click to turn page</div>
<div id="stage"></div>

<script>
const TOTAL = 30;
const VISIBLE_LAYERS = 5;
let current = 4; // 5번째 이미지부터 시작해서 처음부터 5장 겹쳐 보임

const stage = document.getElementById('stage');
const counter = document.getElementById('counter');
const hint = document.getElementById('hint');
const cursorEl = document.getElementById('cursor');

const OPACITIES = [1, 0.45, 0.25, 0.14, 0.07];
const STAGGER_DELAY = 120; // ms

// 레이어 생성
const layers = [];
for (let i = 0; i < VISIBLE_LAYERS; i++) {
  const div = document.createElement('div');
  div.className = 'layer';
  const img = document.createElement('img');
  div.appendChild(img);
  stage.appendChild(div);
  layers.push({ div, img });
}

function render(animate = false) {
  for (let i = 0; i < VISIBLE_LAYERS; i++) {
    const imgIdx = current - i;
    const { div, img } = layers[VISIBLE_LAYERS - 1 - i];

    if (imgIdx >= 0 && imgIdx < TOTAL) {
      const delay = animate ? i * STAGGER_DELAY : 0;
      setTimeout(() => {
        img.src = `${imgIdx + 1}.png`;
        div.style.opacity = OPACITIES[i];
        div.style.display = 'flex';
      }, delay);
    } else {
      div.style.display = 'none';
    }
  }
  counter.textContent = `${current + 1} / ${TOTAL}`;
}

let turning = false;

function goNext() {
  if (current < TOTAL - 1 && !turning) {
    turning = true;
    current++;
    render(true);
    setTimeout(() => { turning = false; }, VISIBLE_LAYERS * STAGGER_DELAY + 200);
  }
}

function goPrev() {
  if (current > 0 && !turning) {
    turning = true;
    current--;
    render(true);
    setTimeout(() => { turning = false; }, VISIBLE_LAYERS * STAGGER_DELAY + 200);
  }
}

// keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goNext();
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goPrev();
});

// click — left half prev, right half next
document.addEventListener('click', e => {
  if (e.clientX > window.innerWidth / 2) goNext();
  else goPrev();
});

// cursor
document.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top  = e.clientY + 'px';
  if (e.clientX > window.innerWidth / 2) cursorEl.classList.add('next');
  else cursorEl.classList.remove('next');
});

// hint fade
setTimeout(() => { hint.style.opacity = '0'; }, 4000);

// init
render();
</script>
</body>
</html>
