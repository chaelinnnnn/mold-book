<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Language as Mold — Field Notes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #f2f0eb;
    --ink: #1a1a18;
    --mid: #8a8880;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: 'IM Fell English', serif;
    overflow: hidden;
    cursor: none;
  }

  /* custom cursor */
  #cursor {
    position: fixed;
    pointer-events: none;
    z-index: 1000;
    width: 10px; height: 10px;
    border: 1px solid rgba(26,26,24,0.4);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: width 0.15s, height 0.15s;
  }
  #cursor.next  { width: 18px; height: 18px; border-color: var(--ink); }

  /* page counter */
  #counter {
    position: fixed;
    bottom: 40px; right: 48px;
    font-size: 11px;
    letter-spacing: 0.14em;
    color: rgba(26,26,24,0.35);
    z-index: 100;
    user-select: none;
  }

  /* title */
  #title {
    position: fixed;
    top: 36px; left: 48px;
    font-size: 11px;
    letter-spacing: 0.14em;
    color: rgba(26,26,24,0.3);
    z-index: 100;
    user-select: none;
  }

  /* nav hint */
  #hint {
    position: fixed;
    bottom: 40px; left: 48px;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: rgba(26,26,24,0.25);
    z-index: 100;
    user-select: none;
    font-style: italic;
    transition: opacity 0.5s;
  }

  /* stage */
  #stage {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* each layer */
  .layer {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.6s ease;
  }

  .layer img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    mix-blend-mode: multiply;
  }
</style>
</head>
<body>

<div id="cursor"></div>
<div id="title">Language as Mold — Field Notes</div>
<div id="counter">1 / 30</div>
<div id="hint">← → or click to turn page</div>
<div id="stage"></div>

<script>
const TOTAL = 30;
const VISIBLE_LAYERS = 5; // 몇 장이 겹쳐 보일지
let current = 0;

const stage = document.getElementById('stage');
const counter = document.getElementById('counter');
const hint = document.getElementById('hint');
const cursorEl = document.getElementById('cursor');

// 레이어 opacity 설정 — 맨 위가 가장 진하고 아래로 갈수록 옅어짐
const OPACITIES = [1, 0.45, 0.25, 0.14, 0.07];

// 레이어 생성
const layers = [];
for (let i = 0; i < VISIBLE_LAYERS; i++) {
  const div = document.createElement('div');
  div.className = 'layer';
  const img = document.createElement('img');
  div.appendChild(img);
  stage.appendChild(div);
  layers.push({ div, img });
}

function getImgIndex(layerPos) {
  // layerPos 0 = 맨 위 (current), 1 = 바로 아래, ...
  const idx = current - layerPos;
  return idx;
}

function render() {
  for (let i = 0; i < VISIBLE_LAYERS; i++) {
    const imgIdx = getImgIndex(i);
    const { div, img } = layers[VISIBLE_LAYERS - 1 - i]; // 뒤에서부터 쌓기

    if (imgIdx >= 0 && imgIdx < TOTAL) {
      img.src = `${imgIdx + 1}.png`;
      div.style.opacity = OPACITIES[i];
      div.style.display = 'flex';
    } else {
      div.style.display = 'none';
    }
  }

  counter.textContent = `${current + 1} / ${TOTAL}`;
}

function goNext() {
  if (current < TOTAL - 1) {
    current++;
    render();
  }
}

function goPrev() {
  if (current > 0) {
    current--;
    render();
  }
}

// keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goNext();
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goPrev();
});

// click — left half prev, right half next
document.addEventListener('click', e => {
  if (e.clientX > window.innerWidth / 2) goNext();
  else goPrev();
});

// cursor
document.addEventListener('mousemove', e => {
  cursorEl.style.left = e.clientX + 'px';
  cursorEl.style.top  = e.clientY + 'px';
  if (e.clientX > window.innerWidth / 2) cursorEl.classList.add('next');
  else cursorEl.classList.remove('next');
});

// hint fade
setTimeout(() => { hint.style.opacity = '0'; }, 4000);

// init
render();
</script>
</body>
</html>
